# Copy this table into a trusted Codex config and launch Codex from the repository root.
# The embedding model must be prepared locally and the CodeScope index built before search.
[mcp_servers.codescope]
command = "uv"
args = ["run", "codescope", "serve"]
startup_timeout_sec = 30
tool_timeout_sec = 60
enabled = true
required = false
enabled_tools = [
  "search_code",
  "find_symbol",
  "find_similar",
  "list_indexed_files",
]
default_tools_approval_mode = "auto"

# Run `codex mcp list` to verify registration; use `/mcp` inside Codex to inspect tools.
